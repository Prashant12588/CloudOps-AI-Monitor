services:
  cloudops-app:
    build: ./app
    container_name: cloudops-app
    restart: always
    expose:
      - "5000"

  nginx:
    build: ./nginx
    container_name: cloudops-nginx
    ports:
      - "80:80"
    depends_on:
      - cloudops-app
    restart: always

  prometheus:
    image: prom/prometheus
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - cloudops-app
    restart: always
