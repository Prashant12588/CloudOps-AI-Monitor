services:
  cloudops-app:
    build: ./app
    container_name: cloudops-app
    restart: always
    expose:
      - "5000"

  nginx:
    build: ./nginx
    container_name: cloudops-nginx
    ports:
      - "80:80"
    depends_on:
      - cloudops-app
    restart: always

  prometheus:
    image: prom/prometheus
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - cloudops-app
    restart: always

  grafana:
    image: grafana/grafana
    container_name: grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    restart: always

  node-exporter:
    image: prom/node-exporter
    container_name: node-exporter
    ports:
      - "9100:9100"
    restart: always
